<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact | tyler</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="icon" href="/assets/images/chicken-favicon-16x16.ico" type="image/x-icon" />
</head>
<body>
    <nav>
        <a href="/">home</a>
        <a href="/posts/">posts</a>
        <a href="/bookshelf/">bookshelf</a>
        <!-- <a href="/projects/">projects</a> -->
        <a href="/about/">about</a>
        <a href="/contact/">contact</a>
    </nav>
    <hr class="nav-divider">
    <main class="contact-page">
        <div class="contact-container">
  <div class="contact-box">
    <p>
      <span id="email-clickable" class="email-link">contact@tylerhext.com</span>
      <span id="copy-indicator" class="copy-indicator">✓ copied</span>
    </p>
  </div>
</div>
<style>
.email-link {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: #f792ad;
  user-select: none;
}

.email-link:hover {
  text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff;
}

.copy-indicator {
  margin-left: 0.5rem;
  font-size: 0.85rem;
  color: #f792ad;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.copy-indicator.show {
  opacity: 1;
}
</style>
<script>
(function() {
  const emailElement = document.getElementById('email-clickable');
  const copyIndicator = document.getElementById('copy-indicator');
  const email = 'contact@tylerhext.com';

  emailElement.addEventListener('click', function() {
    // Copy to clipboard
    navigator.clipboard.writeText(email).then(function() {
      // Show indicator
      copyIndicator.classList.add('show');

      // Hide after 1.5 seconds
      setTimeout(function() {
        copyIndicator.classList.remove('show');
      }, 1500);
    }).catch(function(err) {
      console.error('Failed to copy:', err);
    });
  });
})();
</script>

    </main>
</body>
</html>
